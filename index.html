<!doctype html>
<html class="no-js" lang="">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Tic Tac Toe (Gato)</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="./style.css" type="text/css" media="screen" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png">
        <!-- Place favicon.ico in the root directory -->

    </head>
    <body>
        <main>
            <dialog class="press-start-2p-regular">
                <p></p>
                <button autofocus>
                    Accept
                </button>
            </dialog>
            <section class="title">
                <h1 class="tiny5-regular">TIC TAC TOE</h1>
                <button type="button" class="dynalight-regular start">
                    Start!
                </button>
            </section>
            <section class="main press-start-2p-regular">
                <div class="player1">
                    <label>
                        Player 1: <input class="player1name" type="text">
                    </label>
                    <p>Symbol: <span class="player1symbol">__</span> </p>
                    <p>Score: <span class="player1score">__</span> </p>
                </div>

                <div class="board">

                </div>

                <div class="player2">
                    <label>
                        Player 2: <input class="player2name" type="text">
                    </label>
                    <p>Symbol: <span class="player2symbol">__</span> </p>
                    <p>Score: <span class="player2score">__</span> </p>
                </div>

            </section>

        </main>

        <script type="text/javascript" src="./main.js"></script>
    </body>
</html>
